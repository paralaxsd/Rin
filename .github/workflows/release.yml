name: Build-Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: "Set VersionSuffix for Preview"
      if: "contains(github.ref, 'preview')"
      run: |
        echo "VERSION_SUFFIX=preview.$(date '+%Y%m%d-%H%M%S')+${GITHUB_SHA:0:6}" >> $GITHUB_ENV

    - name: "Rin.Frontend: build & pack"
      working-directory: src/Rin.Frontend
      env:
        NODE_OPTIONS: --openssl-legacy-provider
      run: |
        yarn
        yarn run build
        yarn run pack

    - name: "Rin.Mvc.Frontend: build"
      working-directory: src/Rin.Mvc.Frontend
      env:
        NODE_OPTIONS: --openssl-legacy-provider
      run: |
        yarn
        yarn run build

    - name: Copy Rin.Mvc.Frontend
      run: |
        mkdir -p src/Rin.Mvc/EmbeddedResources/
        cp -R src/Rin.Mvc.Frontend/dist/static/* src/Rin.Mvc/EmbeddedResources/

    - name: "dotnet build & pack"
      run: |
        dotnet restore
        dotnet build -c Release
        dotnet pack -c Release -o $GITHUB_WORKSPACE/artifacts --version-suffix "$VERSION_SUFFIX" -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

    - uses: actions/upload-artifact@v4
      with:
        name: Packages
        path: artifacts

    - name: "Login to NuGet.org (OIDC)"
      id: login
      uses: NuGet/login@v1
      with:
        user: mtopf

    - name: "Push to NuGet.org"
      run: |
        dotnet nuget push "$GITHUB_WORKSPACE/artifacts/*.nupkg" --skip-duplicate -k ${{ steps.login.outputs.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
